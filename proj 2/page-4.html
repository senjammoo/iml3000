<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Light</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body.page {
      background-color: black;
      color: white;
      font-family: "Courier New", monospace;
      margin: 0;
    }

    .page-container {
      width: 70%;
      margin: 60px auto;
      text-align: left;
    }

    h1 {
      font-size: 60px;
      text-shadow: 0 0 10px white;
      margin-bottom: 30px;
    }

    .text-space {
      font-size: 18px;
      line-height: 1.8;
      margin-bottom: 40px;
      padding: 0 20px;
      text-shadow: 0 0 5px rgba(255,255,255,0.3);
    }

    .image-space {
      width: 100%;
      height: 300px;
      border: 1px solid white;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 40px;
    }

    .placeholder {
      opacity: 0.5;
      font-size: 16px;
      letter-spacing: 1px;
    }

    .nav-page {
      display: flex;
      justify-content: space-between;
      margin-bottom: 50px;
    }

    .nav-page a {
      text-decoration: none;
      color: white;
      border: 1px solid white;
      padding: 10px 20px;
      transition: 0.4s ease;
    }

    .nav-page a:hover {
      background-color: white;
      color: black;
      box-shadow: 0 0 15px white;
    }
  </style>
</head>

<body class="page">

  <div class="page-container">

    <h1>Light</h1>

    <div class="text-space">
      <p>
        Light cuts through the darkness.<br>
        It reflects, it reveals, it becomes direction, a path.<br>
      </p>
    </div>

    <div class="image-space">
      <img src="https://images.unsplash.com/photo-1556943899-ec04e7100e1b?ixid=M3w3Nzk0OTl8MHwxfHNlYXJjaHwxfHxzdGFyJTIwbGlnaHR8ZW58MXx8fHwxNzcyNTc5NjMwfDA&amp;ixlib=rb-4.1.0&amp;w=1080&amp;q=80&amp;fit=max&amp;fm=jpg&amp;cs=tinysrgb">
    </div>

    <div class="nav-page">
      <a href="page-3.html" class="back">Back</a>
      <a href="page-5.html" class="next">Next</a>
    </div>

  </div>

</body>
</html>
